spring.application.name=auth-server
server.port=8900
# Tomcat 猫驴聻忙聨楼猫露聟忙聴露忙聴露茅聴麓茂录聢忙炉芦莽搂聮茂录聣
server.tomcat.connection-timeout=30000
# Tomcat 忙聹聙氓陇搂莽潞驴莽篓聥忙聲掳
server.tomcat.threads.max=200

spring.cloud.nacos.discovery.ip=127.0.0.1
spring.cloud.nacos.discovery.heart-beat-interval=10000
spring.cloud.nacos.discovery.heart-beat-timeout=60000
spring.cloud.nacos.discovery.ip-delete-timeout=120000

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/auth_server
spring.datasource.username=root
spring.datasource.password=QLBM2905
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# HikariCP 脙篓脗驴脗聻脙娄脗聨脗楼脙娄脗卤脗聽脙漏脗聟脗聧脙搂脗陆脗庐
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=????
spring.mail.password=????
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# 茅聜庐盲禄露猫驴聻忙聨楼猫露聟忙聴露忙聴露茅聴麓茂录聢忙炉芦莽搂聮茂录聣
spring.mail.properties.mail.smtp.connectiontimeout=10000
# 茅聜庐盲禄露猫炉禄氓聫聳猫露聟忙聴露忙聴露茅聴麓茂录聢忙炉芦莽搂聮茂录聣
spring.mail.properties.mail.smtp.timeout=10000
# 茅聜庐盲禄露氓聠聶氓聟楼猫露聟忙聴露忙聴露茅聴麓茂录聢忙炉芦莽搂聮茂录聣
spring.mail.properties.mail.smtp.writetimeout=10000

spring.data.redis.port=6377
spring.data.redis.host=127.0.0.1
spring.data.redis.database=3
# Redis 脙篓脗驴脗聻脙娄脗聨脗楼脙篓脗露脗聟脙娄脗聴脗露脙娄脗聴脗露脙漏脗聴脗麓脙炉脗录脗聢脙娄脗炉脗芦脙搂脗搂脗聮脙炉脗录脗聣
spring.data.redis.timeout=5000
# Lettuce 脙篓脗驴脗聻脙娄脗聨脗楼脙娄脗卤脗聽脙漏脗聟脗聧脙搂脗陆脗庐
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1



spring.cloud.inetutils.preferred-networks=127.0.0.1
spring.cloud.inetutils.ignored-interfaces=.*

spring.rabbitmq.addresses=localhost:5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.concurrency=5
spring.rabbitmq.listener.simple.max-concurrency=10
# RabbitMQ 脙篓脗驴脗聻脙娄脗聨脗楼脙篓脗露脗聟脙娄脗聴脗露脙娄脗聴脗露脙漏脗聴脗麓脙炉脗录脗聢脙娄脗炉脗芦脙搂脗搂脗聮脙炉脗录脗聣
spring.rabbitmq.connection-timeout=15000

# Feign 脙聝脗聝脙聜脗漏脙聝脗聜脙聜脗聟脙聝脗聜脙聜脗聧脙聝脗聝脙聜脗搂脙聝脗聜脙聜脗陆脙聝脗聜脙聜脗庐
feign.client.config.default.connect-timeout=10000
feign.client.config.default.read-timeout=30000
feign.client.config.default.logger-level=basic
feign.okhttp.enabled=true
feign.compression.request.enabled=true
feign.compression.response.enabled=true